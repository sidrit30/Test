<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnSide - Login</title>
    <style>
        :root {
            --primary-color: #2E7D32; /* Sports green */
            --secondary-color: #1565C0; /* Deep blue */
            --background-color: #F5F7FA;
            --text-color: #333333;
            --border-color: #E0E0E0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .app-title {
            color: var(--primary-color);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #666666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .phone-input-group {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 80px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background-color: #F9F9F9;
            color: #555;
            text-align: center;
        }

        .phone-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .phone-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.1);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #1B5E20;
        }

        .terms {
            margin-top: 25px;
            font-size: 12px;
            color: #888888;
            line-height: 1.5;
        }

        .terms a {
            color: var(--secondary-color);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="app-title">OnSide</div>
        <div class="subtitle">Enter your phone number to get started. No passwords required.</div>

        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('OTP Sent to ' + document.getElementById('phone').value);">
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <div class="phone-input-group">
                    <input type="text" class="country-code" value="+355" readonly aria-label="Country Code">
                    <input type="tel" id="phone" class="phone-input" placeholder="e.g. 69 123 4567" required pattern="[0-9 ]+">
                </div>
            </div>

            <button type="submit" class="submit-btn">Send OTP Code</button>
        </form>

        <div class="terms">
            By continuing, you agree to OnSide's <br>
            <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
    </div>

</body>
</html>
